---
- name: Ensure jq is installed
  package:
    name: jq
    state: present

- name: Check if /root/startup.sh exists
  stat:
    path: /root/startup.sh
  register: startup_script

- name: Ensure startup.sh is executable
  file:
    path: /root/startup.sh
    mode: '0700'
  when: startup_script.stat.exists

- name: Run /root/startup.sh with metadata file path
  command: /root/startup.sh {{ metadata_file }}
  when: startup_script.stat.exists
  register: startup_result
  failed_when: false

- name: Show startup.sh output
  debug:
    msg: "{{ startup_result.stdout_lines }}"
  when: startup_script.stat.exists and startup_result.stdout_lines is defined
